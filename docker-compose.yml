version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: techtrack-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_password}
      MYSQL_DATABASE: ${DB_NAME:-techtrack_db}
      MYSQL_USER: ${DB_USER:-techtrack_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-techtrack_secure_password}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - techtrack
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techtrack-backend
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-techtrack_db}
      DB_USER: ${DB_USER:-techtrack_user}
      DB_PASSWORD: ${DB_PASSWORD:-techtrack_secure_password}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: 3306
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost,http://127.0.0.1}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - techtrack
    restart: unless-stopped
    command: >
      sh -c "sleep 30 &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn djangomonitor.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techtrack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - techtrack
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  techtrack:
    driver: bridge
