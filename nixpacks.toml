# Override Railpack's default behavior - run our pure Python startup script
# This prevents Railpack from generating the broken "cd && python" command

[start]
cmd = "python /app/backend/djangomonitor/run_server_docker.py"

[build]
# Let nixpacks/railpack handle installation normally
# (pip installing from backend/requirements.txt)
cmds = []

[install]
# Skip any install - let the default Python installation run
cmds = []


