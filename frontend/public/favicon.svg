<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="wbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="#ffffff" rx="12"/>
  
  <!-- WB Monogram -->
  <text x="32" y="45" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#wbGrad)" text-anchor="middle" dominant-baseline="middle">WB</text>
  
  <!-- Border for definition -->
  <rect width="64" height="64" fill="none" stroke="#E0E0E0" stroke-width="1" rx="12"/>
</svg>