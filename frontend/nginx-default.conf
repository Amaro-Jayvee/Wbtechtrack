# Docker internal DNS resolver
resolver 127.0.0.11:53 valid=10s;
resolver_timeout 5s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static files with caching
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API endpoints - proxy to backend via internal hostname
    location /api/ {
        set $backend "wbtechttrack.railway.internal:8080";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 30s;
    }

    # App endpoints - proxy to backend via internal hostname
    location /app/ {
        set $backend "wbtechttrack.railway.internal:8080";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 30s;
    }

    # Admin endpoints - proxy to backend via internal hostname
    location /admin/ {
        set $backend "wbtechttrack.railway.internal:8080";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 30s;
    }

    # SPA routing - serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

