server {
    listen 80;
    server_name _;

    # Set root directory for static files
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Disable buffering for faster response
    proxy_buffering off;

    # Log all errors for debugging
    error_log /var/log/nginx/error.log debug;

    # Serve static assets with caching
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend-service-production-08d5.up.railway.app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App proxy
    location /app/ {
        proxy_pass http://backend-service-production-08d5.up.railway.app:8080/app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin proxy
    location /admin/ {
        proxy_pass http://backend-service-production-08d5.up.railway.app:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing - serve index.html for all other routes
    location / {
        if (-f $request_filename) {
            break;
        }
        rewrite ^(.*)$ /index.html break;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

