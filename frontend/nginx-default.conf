server {
    listen 80;
    server_name _;

    # Root directory
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Enable error logging for debugging
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log main;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;

    # Static files - cache for long time
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy app requests to Django backend (use backend public URL)
    location ~^/app/ {
        proxy_pass http://backend-service-production-08d5.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host backend-service-production-08d5.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_redirect off;
    }

    # Proxy API requests to Django backend
    location ~^/api/ {
        proxy_pass http://backend-service-production-08d5.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host backend-service-production-08d5.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }

    # Admin interface
    location ~^/admin/ {
        proxy_pass http://backend-service-production-08d5.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host backend-service-production-08d5.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SPA routing - serve index.html for all non-file requests (MUST be last)
    location / {
        # First try the actual file/directory
        try_files $uri $uri/ /index.html;
        # If nothing else matches, serve index.html for SPA routing
        error_page 404 =200 /index.html;
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Error handling
    error_page 404 /index.html;
}
