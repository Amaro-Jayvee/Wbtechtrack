server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2|html)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Serve index.html for SPA (all non-file routes)
    location / {
        try_files $uri /index.html;
    }
}

