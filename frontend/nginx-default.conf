server {
    listen 80;
    server_name _;

    # Root directory
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Resolver: Allow nginx to resolve hostnames at runtime (not startup)
    # Include CloudFlare DNS as fallback
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=30s;
    resolver_timeout 10s;

    # Backend service hostname - Try public URL first (better reliability)
    # Fallback to internal hostname if public is not available
    set $backend_host "backend-service-production-08d5.up.railway.app";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;

    # Static files - cache for long time
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy app requests to Django backend
    location ^~ /app/ {
        proxy_pass http://$backend_host/app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_cookie_path /app/ /app/;
        proxy_cookie_domain ~^(.*)$ "$host";
        proxy_pass_header Set-Cookie;
    }

    # Proxy API requests to Django backend
    location ^~ /api/ {
        proxy_pass http://$backend_host/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Admin interface
    location ^~ /admin/ {
        proxy_pass http://$backend_host/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing - serve index.html for all non-file requests (MUST be last)
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Error handling
    error_page 404 /index.html;
}
